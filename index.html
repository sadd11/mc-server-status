<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0f0f13; color: #ffffff;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            transition: all 0.5s ease;
        }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        /* SECRET BUTTON (TOP LEFT) */
        .secret-trigger-area {
            position: fixed; top: 0; left: 0; width: 60px; height: 60px; z-index: 9999;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .secret-trigger-area:hover { opacity: 1; background: radial-gradient(circle, rgba(76,175,80,0.4) 0%, transparent 70%); }
        .secret-emoji { font-size: 2em; user-select: none; }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 40px; width: 380px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); text-align: center; z-index: 1; pointer-events: auto;
            position: relative; /* Default position */
        }
        
        h2 {
            margin-top: 0; margin-bottom: 15px; font-weight: 700; font-size: 1.8rem;
            background: linear-gradient(90deg, #4CAF50, #8BC34A); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.3); min-height: 40px;
        }

        /* INPUT FIELD */
        .ip-input-container { margin-bottom: 25px; position: relative; }
        .ip-input {
            width: 90%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; padding: 12px; border-radius: 12px; font-family: 'Courier New', monospace;
            text-align: center; font-size: 1em; outline: none; transition: 0.3s;
        }
        .ip-input:focus { border-color: #4CAF50; box-shadow: 0 0 15px rgba(76, 175, 80, 0.3); }

        .status-box {
            padding: 15px; border-radius: 16px; background-color: rgba(0, 0, 0, 0.2); margin-bottom: 25px;
            font-weight: 600; font-size: 1.1em; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #666; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .online { background-color: rgba(76, 175, 80, 0.15); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .online .status-dot { background-color: #4CAF50; box-shadow: 0 0 10px #4CAF50; animation: pulse 2s infinite; }
        .offline { background-color: rgba(244, 67, 54, 0.15); color: #F44336; border: 1px solid rgba(244, 67, 54, 0.3); }
        .offline .status-dot { background-color: #F44336; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .info-item { background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; gap: 5px; }
        .info-label { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 1.1em; font-weight: 600; }
        
        .btn {
            width: 100%; background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border: none;
            padding: 16px; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: 600;
            letter-spacing: 0.5px; transition: all 0.3s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(76, 175, 80, 0.5); filter: brightness(1.1); }
        
        /* TROLL MENU */
        #troll-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .troll-content { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #F44336; text-align: center; box-shadow: 0 0 30px #F44336; width: 340px; max-height: 90vh; overflow-y: auto; }
        .troll-content h3 { color: #F44336; margin-top: 0; text-transform: uppercase; }
        .troll-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .troll-btn { display: block; width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.8em; }
        .troll-btn:hover { background: #F44336; transform: scale(1.05); }
        .close-troll { margin-top: 15px; color: #888; cursor: pointer; text-decoration: underline; font-size: 0.9em; }
        #troll-active-indicator { display: none; position: fixed; top: 20px; right: 20px; background: #F44336; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 1000; box-shadow: 0 0 20px red; animation: pulse 0.5s infinite; }

        /* VHS OVERLAY */
        .vhs-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 998;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        /* ANIMATIONS */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 25% { transform: translate(-5px, 5px) rotate(-5deg); } 75% { transform: translate(5px, -5px) rotate(5deg); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes disco { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes barrel { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blackhole { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(0) rotate(720deg); } }
        @keyframes gravity { 0% { transform: translateY(0); } 100% { transform: translateY(100vh) rotate(20deg); } }
        @keyframes zoomInfinite { 0% { transform: scale(1); } 100% { transform: scale(20); } }
        @keyframes flashbang { 0%, 100% { background: #0f0f13; } 50% { background: white; } }
        @keyframes mold { 0% { filter: sepia(0) blur(0); } 100% { filter: sepia(1) blur(5px) hue-rotate(50deg); } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="vhs-overlay" id="vhs-layer"></div>

<!-- Секретная зона -->
<div class="secret-trigger-area" onclick="openTrollMenu()">
    <div class="secret-emoji">🌲</div>
</div>

<div id="troll-active-indicator">⚠️ TROLL MODE ACTIVE ⚠️</div>

<div class="card" id="main-card">
    <h2 id="server-title">TreeLand Monitor</h2>
    <div class="ip-input-container">
        <input type="text" id="ip-input" class="ip-input" value="185.9.145.8:25843" placeholder="Введите IP сервера">
    </div>
    <div id="status-display" class="status-box"><div class="status-dot"></div><span>Загрузка...</span></div>
    <div class="info-grid">
        <div class="info-item"><span class="info-label">Игроки</span><span class="info-value" id="player-count">-</span></div>
        <div class="info-item"><span class="info-label">Версия</span><span class="info-value" id="version">-</span></div>
    </div>
    <button class="btn" onclick="checkStatus()">Проверить статус</button>
</div>

<!-- TROLL MENU UI -->
<div id="troll-modal">
    <div class="troll-content">
        <h3>👹 ULTIMATE TROLL 👹</h3>
        <p style="color: #aaa; font-size: 0.8em; margin-bottom: 15px;">Действует на всех!</p>
        <div class="troll-grid">
            <button class="troll-btn" onclick="triggerGlobalTroll('shake')">Землетрясение</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('australia')">Австралия</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('glitch')">Глюк Матрицы</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('spin')">Центрифуга</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('disco')">Disco Party</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('barrel')">Barrel Roll</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('blackhole')">Черная дыра</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('gravity')">Гравитация</button>
            <!-- NEW -->
            <button class="troll-btn" onclick="triggerGlobalTroll('vhs')">VHS Horror</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('dvd')">DVD Bouncer</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('zoom')">Inception</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('flash')">Flashbang</button>
            <button class="troll-btn" onclick="triggerGlobalTroll('mold')">Плесень</button>
        </div>
        <button class="troll-btn" onclick="triggerGlobalTroll('none')" style="border-color: #4CAF50; color: #4CAF50; margin-top: 15px;">⛔ СТОП ⛔</button>
        <div class="close-troll" onclick="closeTrollMenu()">Закрыть</div>
    </div>
</div>

<!-- FIREBASE LOGIC -->
<script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyBqoSmd5hvo1lGCMsOggCYvaha4WT6L2Qc",
      authDomain: "treeland-troll.firebaseapp.com",
      databaseURL: "https://treeland-troll-default-rtdb.firebaseio.com",
      projectId: "treeland-troll",
      storageBucket: "treeland-troll.firebasestorage.app",
      messagingSenderId: "579455341624",
      appId: "1:579455341624:web:47b237778f227b3f6842cd",
      measurementId: "G-CDNGKWZBN8"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const trollRef = ref(db, 'global_troll_state');

    // Переменные для сложных анимаций
    let dvdAnimationId = null;

    onValue(trollRef, (snapshot) => {
        const data = snapshot.val();
        const body = document.body;
        const card = document.getElementById('main-card');
        const indicator = document.getElementById('troll-active-indicator');
        const vhsLayer = document.getElementById('vhs-layer');
        
        // --- 1. СБРОС ВСЕХ ЭФФЕКТОВ ---
        body.style.animation = ''; body.style.transform = ''; body.style.filter = '';
        card.style.position = ''; card.style.top = ''; card.style.left = ''; card.style.transform = '';
        indicator.style.display = 'none';
        vhsLayer.style.display = 'none';
        
        // Остановка JS анимаций
        if (dvdAnimationId) { cancelAnimationFrame(dvdAnimationId); dvdAnimationId = null; }

        // --- 2. ПРИМЕНЕНИЕ НОВЫХ ---
        if (data && data.effect && data.effect !== 'none') {
            indicator.style.display = 'block';
            switch(data.effect) {
                case 'shake': body.style.animation = 'shake 0.1s infinite'; break;
                case 'australia': body.style.transform = 'rotate(180deg)'; break;
                case 'glitch': body.style.filter = 'invert(1) hue-rotate(90deg) contrast(2)'; body.style.transform = 'skew(20deg)'; break;
                case 'spin': body.style.animation = 'spin 1s infinite linear'; break;
                case 'disco': body.style.animation = 'disco 0.2s infinite'; break;
                case 'barrel': body.style.animation = 'barrel 2s ease-in-out'; break;
                case 'blackhole': body.style.animation = 'blackhole 3s forwards'; break;
                case 'gravity': body.style.animation = 'gravity 2s forwards ease-in'; break;
                
                // НОВЫЕ ЭФФЕКТЫ
                case 'zoom': body.style.animation = 'zoomInfinite 10s infinite linear'; break;
                case 'flash': body.style.animation = 'flashbang 0.1s infinite'; break;
                case 'mold': body.style.animation = 'mold 5s infinite alternate'; break;
                case 'vhs': 
                    vhsLayer.style.display = 'block'; 
                    body.style.filter = 'contrast(1.5) brightness(0.8) sepia(0.3)';
                    body.style.transform = 'scale(1.02)';
                    break;
                case 'dvd': 
                    startDVD(card); 
                    break;
            }
        }
    });

    window.triggerGlobalTroll = function(effectName) {
        set(trollRef, { effect: effectName, timestamp: Date.now() });
        document.getElementById('troll-modal').style.display = 'none';
    }

    // --- ЛОГИКА DVD BOUNCER ---
    function startDVD(element) {
        element.style.position = 'fixed';
        let x = Math.random() * (window.innerWidth - 380);
        let y = Math.random() * (window.innerHeight - 400);
        let dx = 5 * (Math.random() > 0.5 ? 1 : -1);
        let dy = 5 * (Math.random() > 0.5 ? 1 : -1);

        function animateDVD() {
            const rect = element.getBoundingClientRect();
            
            if (x + rect.width >= window.innerWidth || x <= 0) dx = -dx;
            if (y + rect.height >= window.innerHeight || y <= 0) dy = -dy;

            x += dx;
            y += dy;

            element.style.left = x + 'px';
            element.style.top = y + 'px';
            
            dvdAnimationId = requestAnimationFrame(animateDVD);
        }
        animateDVD();
    }
</script>

<!-- JS UI LOGIC -->
<script>
    function openTrollMenu() { document.getElementById('troll-modal').style.display = 'flex'; }
    function closeTrollMenu() { document.getElementById('troll-modal').style.display = 'none'; }

    // --- ЭКСТРЕННОЕ ВЫКЛЮЧЕНИЕ (3 КЛИКА) ---
    let clickCount = 0;
    let clickTimer = null;
    document.addEventListener('click', (e) => {
        if (e.target.closest('#troll-modal')) return;
        clickCount++;
        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 500);
        if (clickCount >= 3) {
            console.log("Emergency Stop!");
            if (window.triggerGlobalTroll) window.triggerGlobalTroll('none');
            clickCount = 0;
        }
    });

    // --- BACKGROUND ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particlesArray;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let mouse = { x: null, y: null, radius: 80 };

    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    window.addEventListener('mouseout', () => { mouse.x = undefined; mouse.y = undefined; });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.dX = (Math.random() * 0.4) - 0.2; this.dY = (Math.random() * 0.4) - 0.2; 
            this.size = (Math.random() * 5) + 2; this.color = 'rgba(255, 255, 255, 0.4)';
        }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.strokeStyle = this.color; ctx.stroke(); }
        update() {
            if (this.x > canvas.width || this.x < 0) this.dX = -this.dX;
            if (this.y > canvas.height || this.y < 0) this.dY = -this.dY;
            if (mouse.x) {
                let dx = mouse.x - this.x, dy = mouse.y - this.y;
                if (Math.sqrt(dx*dx + dy*dy) < mouse.radius + this.size) {
                    if (mouse.x < this.x) this.x += 10; else this.x -= 10;
                    if (mouse.y < this.y) this.y += 10; else this.y -= 10;
                }
            }
            this.x += this.dX; this.y += this.dY; this.draw();
        }
    }

    function init() { particlesArray = []; for (let i=0; i<(canvas.width*canvas.height)/7000; i++) particlesArray.push(new Particle()); }
    function animate() {
        requestAnimationFrame(animate); ctx.clearRect(0, 0, innerWidth, innerHeight);
        particlesArray.forEach(p => p.update());
        let cd = (canvas.width/7)*(canvas.height/7);
        for (let a=0; a<particlesArray.length; a++) {
            for (let b=a; b<particlesArray.length; b++) {
                let d = ((particlesArray[a].x-particlesArray[b].x)**2)+((particlesArray[a].y-particlesArray[b].y)**2);
                if (d < cd) {
                    ctx.strokeStyle = 'rgba(255,255,255,' + (1-d/cd)*0.8 + ')';
                    ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                }
            }
        }
    }
    window.addEventListener('resize', () => { canvas.width=innerWidth; canvas.height=innerHeight; init(); });
    init(); animate();

    // --- SERVER STATUS ---
    async function checkStatus() {
        const ipInput = document.getElementById('ip-input').value.trim();
        const statusBox = document.getElementById('status-display');
        const statusText = statusBox.querySelector('span');
        const playerCount = document.getElementById('player-count');
        const versionDisplay = document.getElementById('version');
        const titleDisplay = document.getElementById('server-title');

        if (!ipInput) { alert("Введите IP!"); return; }
        statusText.innerText = 'Проверка...'; statusBox.className = 'status-box';

        try {
            const response = await fetch(`https://api.mcsrvstat.us/2/${ipInput}`);
            const data = await response.json();
            if (data.online) {
                statusText.innerText = 'ONLINE'; statusBox.classList.add('online');
                playerCount.innerText = `${data.players.online} / ${data.players.max}`;
                versionDisplay.innerText = data.version;
                titleDisplay.innerText = data.hostname ? data.hostname : "Minecraft Server";
            } else {
                statusText.innerText = 'OFFLINE'; statusBox.classList.add('offline');
                playerCount.innerText = '-'; versionDisplay.innerText = '-';
                titleDisplay.innerText = "Server Offline";
            }
        } catch { statusText.innerText = 'Ошибка API'; statusBox.classList.add('offline'); }
    }
    checkStatus();
</script>
</body>
</html>
